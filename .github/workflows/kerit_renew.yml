name: Kerit-Renew
on:
  workflow_dispatch:
  schedule:
    - cron: '0 1 */6 * *'
jobs:
  run_kerit_login:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 下载公库代码
        uses: actions/checkout@v4
        
      - name: 🐍 设置 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: 🛡️ 启动 Xray 代理转发 (VLESS)
        env:
          VLESS_CONFIG: ${{ secrets.VLESS_CONFIG }}
        run: |
          wget https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip
          unzip Xray-linux-64.zip -d xray
          chmod +x xray/xray
          echo "$VLESS_CONFIG" > xray/config.json
          echo "启动 Xray 转发隧道..."
          nohup ./xray/xray run -c xray/config.json > xray.log 2>&1 &
          sleep 3
          echo "测试本地代理连通性..."
          curl -x http://127.0.0.1:8080 https://api.ipify.org -v
          
      - name: 🛠️ 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            google-chrome-stable \
            xvfb \
            x11-utils \
            xdotool \
            scrot
            
      - name: 🐍 安装 Python 依赖
        run: |
          pip install seleniumbase
          seleniumbase install uc_driver
          
      - name: 🚀 运行脚本
        env:
          PYTHONIOENCODING: utf-8
          KERIT_ACCOUNT: ${{ secrets.KERIT_ACCOUNT }}
          TG_BOT: ${{ secrets.TG_BOT }}
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" python kerit_renew.py
          
      - name: 📸 上传截图
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: "*.png"

      - name: 🗑️ 清理旧的工作流记录
        if: always()
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 7
          keep_minimum_runs: 5
