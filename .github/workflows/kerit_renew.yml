name: Kerit-Renew

on:
  workflow_dispatch:
  schedule:
    - cron: '0 1 */6 * *'

permissions:
  contents: write
  actions: write

jobs:
  run_kerit_login:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 下载公库代码
        uses: actions/checkout@v4

      - name: 🐍 设置 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 🛡️ 启动 Gost 代理转发
        run: |
          wget https://github.com/ginuerzh/gost/releases/download/v2.11.5/gost-linux-amd64-2.11.5.gz
          gunzip gost-linux-amd64-2.11.5.gz
          chmod +x gost-linux-amd64-2.11.5
          mv gost-linux-amd64-2.11.5 gost
          echo "启动 Gost 转发隧道..."
          nohup ./gost -L http://:8080 -F ${{ secrets.GOST_PROXY }} > gost.log 2>&1 &
          sleep 3
          echo "测试本地代理连通性..."
          curl -x http://127.0.0.1:8080 https://api.ipify.org -v

      - name: 🛠️ 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            google-chrome-stable \
            xvfb \
            x11-utils \
            xdotool \
            scrot

      - name: 🐍 安装 Python 依赖
        run: |
          pip install seleniumbase
          seleniumbase install uc_driver

      - name: 🚀 运行脚本
        env:
          PYTHONIOENCODING: utf-8
          KERIT_ACCOUNT: ${{ secrets.KERIT_ACCOUNT }}
          GOST_PROXY: ${{ secrets.GOST_PROXY }}
          TG_BOT: ${{ secrets.TG_BOT }}
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" python kerit_renew.py

      - name: 📸 上传截图
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: "*.png"

      # ⏱️ 提交 time.txt 到仓库(用于解决60天无文件变化的限制)
      - name: ⏱️ Commit time.txt to repo
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if [ ! -f time.txt ]; then
            echo "首次生成时间：$(date +'%Y-%m-%d %H:%M:%S')" > time.txt
          else
            echo "$(date +'%Y-%m-%d %H:%M:%S')" > time.txt
          fi

          git add time.txt

          if git diff --cached --quiet; then
            echo "无变化，无需提交"
          else
            git commit -m "⏱️ 更新时间文件: $(date +'%Y-%m-%d %H:%M:%S')"
            git push origin HEAD:main
          fi

      # 🗑️ 清理旧的运行记录和上传的图片（只保留最近3次）
      - name: 🗑️ Delete old workflow runs
        if: always()
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          retain_days: 0          # 不受天数限制
          keep_minimum_runs: 3    # 核心参数：保留最近3次运行
